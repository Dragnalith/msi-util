name: build

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      BUILDBUDDY_API_KEY:
        required: true
    outputs:
      artifacts:
        description: "Build artifact URL"
        value: ${{ jobs.build.outputs.artifact-url }}

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    runs-on: macos-latest
    outputs:
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@v4
      - name: bazel build //:for_all_platforms
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          bazel build \
            --config release \
            --config remote \
            --remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY \
            //:for_all_platforms
          mv bazel-out/linux_amd64_musl-opt/bin/msi-util msi-util_linux_amd64
          mv bazel-out/linux_arm64_musl-opt/bin/msi-util msi-util_linux_arm64
          mv bazel-out/macos_amd64-opt/bin/msi-util msi-util_darwin_amd64
          mv bazel-out/macos_arm64-opt/bin/msi-util msi-util_darwin_arm64
          mv bazel-out/windows_amd64-opt/bin/msi-util.exe msi-util_windows_amd64.exe
          mv bazel-out/windows_arm64-opt/bin/msi-util.exe msi-util_windows_arm64.exe
      - uses: actions/upload-artifact@v4
        id: upload
        with:
          name: artifacts
          retention-days: 1
          path: |
            msi-util_darwin_amd64
            msi-util_darwin_arm64
            msi-util_linux_amd64
            msi-util_linux_arm64
            msi-util_windows_amd64.exe
            msi-util_windows_arm64.exe
